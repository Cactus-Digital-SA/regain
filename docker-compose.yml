services:
  laravel.test:
    build:
      context: ./docker/8.2
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.2/app
    ports:
      - '${APP_PORT:-80}:80'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      #      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-debug}'
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-debug}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
      PHP_IDE_CONFIG: 'serverName=PHPSTORM'
    volumes:
      - '.:/var/www/html'
      - './docker/8.2/php.ini.custom:/etc/php/8.2/cli/conf.d/98-custom.ini'
      - './docker/8.2/remote-db.sh:/remote-db.sh'
      - './docker/8.2/id_ed25519:/home/sail/.ssh/id_ed25519'  # ✅ Mount the SSH key for sail user
    networks:
      - sail
    depends_on:
      - mysql
      - redis
  mysql:
    image: 'mysql:8.0'
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: 'sail'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - 'sailmysql:/var/lib/mysql'
    networks:
      - sail
    healthcheck:
      test:
        [ "CMD", "mysqladmin","ping" ]
  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'sailredis:/data'
    networks:
      - sail
    healthcheck:
      test:
        [ "CMD","redis-cli","ping" ]
  mailhog:
    image: 'mailhog/mailhog:latest'
    ports:
      - '${FORWARD_MAILHOG_PORT:-1025}:1025'
      - '${FORWARD_MAILHOG_DASHBOARD_PORT:-8025}:8025'
    networks:
      - sail
networks:
  sail:
    driver: bridge
volumes:
  sailmysql:
    driver: local
  sailredis:
    driver: local
  sail-mysql:
    driver: local
